# Southern-hemisphere snow-station archive: every genuinely public station
# series we've found, kept tidy in this repo and surfaced in the site's
# season explorer. Reference/history only — never scoring truth.
# Provenance and licence notes per network; takedown-on-request policy
# applies (open an issue).
networks:
  snowyhydro:
    name: "Snowy Hydro snow courses (NSW, Australia)"
    short: "Snowy Hydro"
    source: "https://www.snowyhydro.com.au/generation/live-data/snow-depths/"
    variable: depth_cm
    cadence: "~weekly snow-course readings, in season"
    license: >-
      No explicit licence; Snowy Hydro "supplies this information in good
      faith for the benefit of the public" with a no-liability disclaimer.
      Republished here minimally, with attribution; removed on request.

  ina:
    name: "INA Red Hidrológica — estaciones nivológicas (Argentina)"
    short: "INA"
    source: "https://alerta.ina.gob.ar/a5 (series var_id=37, nivel de nieve)"
    variable: level_m
    cadence: "daily max of telemetry snow level"
    license: >-
      CC-BY 4.0 (argentina.gob.ar terms; Ley 27275). Attribute "Instituto
      Nacional del Agua (INA), Sistema de Información y Alerta Hidrológico".
      NOTE: the public a5 API currently serves only the 2024 winter; the
      deep RHN history lives in SNIH/BDHI (snih.hidricosargentina.gob.ar) —
      follow-up lead for the full archive. Full 47-station census in
      docs/DATA.md; 13 usable series committed here.

  vicalpine:
    name: "Victorian Alpine Resorts daily snow depths (Data Vic)"
    short: "Vic Alpine"
    source: "https://discover.data.vic.gov.au/dataset/victorian-alpine-resorts-daily-snow-depth-records-mount-buller"
    variable: depth_cm
    cadence: "daily staff measurements, Jun-Oct (avg of up to 4 snow plots)"
    license: >-
      CC-BY 4.0. Attribute "Alpine Resorts Victoria via Data Vic". Files here
      cover 1993-2017 (Wayback mirror); the 2018-2023 update exists on
      alpineresorts.vic.gov.au behind a Cloudflare challenge — one manual
      browser download adds it.

  snih:
    name: "SNIH / RHN snow-pillow SWE (Argentina)"
    short: "SNIH"
    source: "https://snih.hidricosargentina.gob.ar (MuestraDatos.aspx, param 73 EAN snow pillow)"
    variable: swe_mm
    cadence: "daily snow-water-equivalent from snow pillows"
    license: >-
      CC-BY 4.0 (argentina.gob.ar terms; Ley 27275). Attribute "Sistema
      Nacional de Información Hídrica (SNIH) — Red Hidrológica Nacional".
      This is the deep archive the INA a5 API dropped: SWE ("altura EAN")
      back to 1990 for the Mendoza/Neuquén pillow network. Plotted as peak
      seasonal SWE (inches of water), not fresh-snow accumulation.

