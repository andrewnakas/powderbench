name: Validate submission
on:
  pull_request:
    paths:
      - "data/submissions/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Check changed submissions
        env:
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$BASE_SHA" --depth=1
          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'data/submissions/**/*.csv')
          if [ -z "$FILES" ]; then echo "no submission CSVs changed"; exit 0; fi
          FAIL=0
          for f in $FILES; do
            echo "::group::$f"
            # path: data/submissions/<league>/<round>/<team>.csv
            ROUND=$(basename "$(dirname "$f")")
            LEAGUE=$(basename "$(dirname "$(dirname "$f")")")
            python -c "
          import os, sys
          from datetime import date, datetime
          from powderbench.leagues import get_league
          cutoff = get_league('$LEAGUE').cutoff_utc(date.fromisoformat('$ROUND'))
          created = datetime.fromisoformat(os.environ['PR_CREATED_AT'].replace('Z', '+00:00'))
          if created > cutoff:
              print(f'::warning file=$f::PR opened after the $LEAGUE/$ROUND cutoff ({cutoff:%Y-%m-%d %H:%M} UTC) — scored but flagged late')
          "
            powderbench validate "$f" --league "$LEAGUE" || FAIL=1
            echo "::endgroup::"
          done
          exit $FAIL
