name: Scrape resort snow reports
on:
  schedule:
    - cron: "30 20 * * *" # Oceania morning: 08:30 NZST / 06:30 AEST (next local day)
    - cron: "0 13 * * *" # South America morning: 09:00 CLT / 10:00 ART; re-catches Oceania
  workflow_dispatch:

permissions:
  contents: write

concurrency: benchmark-data

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Scrape
        run: powderbench scrape-resorts
      - name: Commit snapshots
        run: |
          git config user.name "powderbench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/resortreports
          git diff --cached --quiet || git commit -m "Archive resort snow reports"
          git pull --rebase origin main
          git push
