name: Open round
on:
  schedule:
    - cron: "5 0 * * *" # northern: open tomorrow's round (~24h window to 00:00 UTC cutoff)
    - cron: "5 11 * * *" # southern: open D+2 (~24h window to the 11:00 UTC D+1 cutoff)
  workflow_dispatch:
    inputs:
      league:
        description: "League (northern | southern)"
        required: true
        default: "northern"
      round_date:
        description: "Round date (YYYY-MM-DD); default per league"
        required: false

permissions:
  contents: write

concurrency: benchmark-data

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Open round
        run: |
          LEAGUE="${{ github.event.inputs.league }}"
          if [ -z "$LEAGUE" ]; then
            [ "$(date -u +%H)" -ge 6 ] && LEAGUE=southern || LEAGUE=northern
          fi
          if [ -n "${{ github.event.inputs.round_date }}" ]; then
            powderbench open-round --league "$LEAGUE" --round-date "${{ github.event.inputs.round_date }}"
          else
            powderbench open-round --league "$LEAGUE"
          fi
      - name: Commit
        run: |
          git config user.name "powderbench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/rounds data/submissions
          git diff --cached --quiet || git commit -m "Open round"
          git pull --rebase origin main
          git push
