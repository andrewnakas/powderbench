name: Open round
on:
  schedule:
    - cron: "5 0 * * *" # 00:05 UTC: open tomorrow's round -> ~24h submission window
  workflow_dispatch:
    inputs:
      round_date:
        description: "Round date (YYYY-MM-DD); default tomorrow UTC"
        required: false

permissions:
  contents: write

concurrency: benchmark-data

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Open round
        run: |
          if [ -n "${{ github.event.inputs.round_date }}" ]; then
            powderbench open-round --round-date "${{ github.event.inputs.round_date }}"
          else
            powderbench open-round
          fi
      - name: Commit
        run: |
          git config user.name "powderbench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/rounds data/submissions
          git diff --cached --quiet || git commit -m "Open round"
          git pull --rebase origin main
          git push
