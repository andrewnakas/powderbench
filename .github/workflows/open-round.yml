name: Open round
on:
  schedule:
    - cron: "5 0 * * *" # stations: open tomorrow's round (~24h window to 00:00 UTC cutoff)
    - cron: "5 11 * * *" # era5 + resorts: open D+2 (~24h window to the 11:00 UTC D+1 cutoff)
  workflow_dispatch:
    inputs:
      league:
        description: "League (stations | era5 | resorts)"
        required: true
        default: "stations"
      round_date:
        description: "Round date (YYYY-MM-DD); default per league"
        required: false

permissions:
  contents: write

concurrency: benchmark-data

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Open round
        run: |
          LEAGUES="${{ github.event.inputs.league }}"
          if [ -z "$LEAGUES" ]; then
            # 11:05 run covers the shared 11:00-UTC-cutoff leagues; 00:05 covers stations
            [ "$(date -u +%H)" -ge 6 ] && LEAGUES="era5 resorts" || LEAGUES="stations"
          fi
          FAILED=0
          for LEAGUE in $LEAGUES; do
            # one league's outage must not block the others
            if [ -n "${{ github.event.inputs.round_date }}" ]; then
              powderbench open-round --league "$LEAGUE" --round-date "${{ github.event.inputs.round_date }}" || FAILED=1
            else
              powderbench open-round --league "$LEAGUE" || FAILED=1
            fi
          done
          exit $FAILED
      - name: Commit
        run: |
          git config user.name "powderbench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/rounds data/submissions
          git diff --cached --quiet || git commit -m "Open round"
          git pull --rebase origin main
          git push
