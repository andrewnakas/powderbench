name: Baseline submissions
on:
  schedule:
    - cron: "15 23 * * *" # stations: 45 min before tomorrow's 00:00 UTC cutoff
    - cron: "15 10 * * *" # era5 + resorts: 45 min before today's 11:00 UTC cutoff (round D = tomorrow)
  workflow_dispatch:
    inputs:
      league:
        description: "League (stations | era5 | resorts)"
        required: true
        default: "stations"
      round_date:
        description: "Round date (YYYY-MM-DD); default tomorrow UTC"
        required: false

permissions:
  contents: write

concurrency: benchmark-data

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Generate baseline forecasts
        run: |
          LEAGUES="${{ github.event.inputs.league }}"
          if [ -z "$LEAGUES" ]; then
            # 10:15 run covers the shared 11:00-UTC-cutoff leagues; 23:15 covers stations
            [ "$(date -u +%H)" -lt 20 ] && LEAGUES="era5 resorts" || LEAGUES="stations"
          fi
          ROUND="${{ github.event.inputs.round_date }}"
          [ -z "$ROUND" ] && ROUND=$(date -u -d tomorrow +%F)
          FAILED=0
          for LEAGUE in $LEAGUES; do
            # one league's outage must not block the others
            powderbench baseline-submit "$ROUND" --league "$LEAGUE" || FAILED=1
          done
          exit $FAILED
      - name: Commit
        run: |
          git config user.name "powderbench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/submissions
          git diff --cached --quiet || git commit -m "Baseline submissions"
          git pull --rebase origin main
          git push
