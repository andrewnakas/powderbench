name: Baseline submissions
on:
  schedule:
    - cron: "15 23 * * *" # northern: 45 min before tomorrow's 00:00 UTC cutoff
    - cron: "15 10 * * *" # southern: 45 min before today's 11:00 UTC cutoff (round D = tomorrow)
  workflow_dispatch:
    inputs:
      league:
        description: "League (northern | southern)"
        required: true
        default: "northern"
      round_date:
        description: "Round date (YYYY-MM-DD); default tomorrow UTC"
        required: false

permissions:
  contents: write

concurrency: benchmark-data

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Generate baseline forecasts
        run: |
          LEAGUE="${{ github.event.inputs.league }}"
          if [ -z "$LEAGUE" ]; then
            [ "$(date -u +%H)" -lt 20 ] && LEAGUE=southern || LEAGUE=northern
          fi
          ROUND="${{ github.event.inputs.round_date }}"
          [ -z "$ROUND" ] && ROUND=$(date -u -d tomorrow +%F)
          powderbench baseline-submit "$ROUND" --league "$LEAGUE"
      - name: Commit
        run: |
          git config user.name "powderbench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/submissions
          git diff --cached --quiet || git commit -m "Baseline submissions"
          git pull --rebase origin main
          git push
