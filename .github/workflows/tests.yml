name: Tests
on:
  push:
    branches: [main]
    paths-ignore:
      - "data/rounds/**"
      - "data/submissions/**"
      - "data/results/**"
      - "site/data/**"
  pull_request:
    paths-ignore:
      - "data/submissions/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q
